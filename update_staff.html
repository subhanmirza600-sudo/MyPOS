<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Update Staff</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<div class="card p-4 text-center">

<h2>Update Staff</h2>
<input type="text" id="staffId" class="form-control mb-3" placeholder="Enter Staff ID To Update">
<input type="text" id="username" class="form-control mb-3" placeholder="Enter New Username">
<input type="email" id="staffEmail" class="form-control mb-3" placeholder="Enter new Email">

<button class="btn btn-info w-100" onclick="updateStaff()">Update Staff</button>

<h3 class="mt-3" id="result"></h3>

        <hr>
        <button class="btn btn-secondary w-100" onclick="window.history.back()">
            Back
        </button>

</div>
</div>

<script>
function updateStaff() {
    const staffId = document.getElementById("staffId").value;
    const username = document.getElementById("username").value;
    const staffEmail = document.getElementById("staffEmail").value;
    fetch("update_staff.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ id: staffId, username, email: staffEmail })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.message;
    });
}
</script>

</body>
</html>
