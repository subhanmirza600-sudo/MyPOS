<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POS Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;

    /* SINGLE BACKGROUND IMAGE */
    background: url('https://images.unsplash.com/photo-1600891964092-4316c288032e') no-repeat center center/cover;
}


/* LOGIN BOX */
.login-box {
    width: 40%;
    height: 60%;
    padding: 30px;
    background: rgba(0,0,0,0.75);
    border-radius: 15px;
    color: white;
    text-align: center;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

.login-box h2 {
    margin-bottom: 10px;
    color: gold;
}

.login-box p {
    margin-bottom: 20px;
    font-size: 14px;
}

input {
    margin-bottom: 12px;
}

.btn-login {
    width: 100%;
}
</style>

</head>

<body>

<!-- LOGIN BOX -->
<div class="login-box">
    <h2>🍔 RESTAURANT POS SYSTEM</h2>
    <p>Welcome! Please login to continue</p>

    <input type="text" id="username" class="form-control" placeholder="Username">
    <input type="password" id="password" class="form-control" placeholder="Password">

    <button class="btn btn-warning btn-login" onclick="window.location.href = 'food - Copy.html';">Login</button>
</div>

<script>
function login() {

    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value.trim();

    if (user === "" || pass === "") {
        alert("Fill all fields");
        return;
    }

    fetch("login.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: user,
            password: pass
        })
    })
    .then(res => res.json())
    .then(data => {

        console.log(data); // DEBUG

        if (data.status === "success") {
            alert("Login Successful!");
            window.location.href = "food%20-%20Copy.html"; // ✅ FIXED SPACE ISSUE
        } else {
            alert(data.message || "Invalid username or password");
        }

    })
    .catch(err => {
        console.log(err);
        alert("Server error");
    });
}
</script>
</body>
</html>
