<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Menu Item</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">
    <div class="card bg p-4 shadow">
        <h2 class="text-center mb-4">Add Menu Item</h2>

        <input type="text" id="itemName" class="form-control mb-3" placeholder="Item Name">
        <input type="number" id="itemPrice" class="form-control mb-3" placeholder="Price">

        <button class="btn btn-success w-100" onclick="addItem()">Add Item</button>
        <hr>
        <button class="btn btn-secondary w-100" onclick="window.history.back()">
            Back
        </button>
    </div>
</div>

<script>
function addItem() {
    let name = document.getElementById("itemName").value;
    let price = document.getElementById("itemPrice").value;

    fetch("add_menu.php", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name, price })
    })
    .then(res => res.text())
    .then(data => alert(data));
}
</script>

</body>
</html>
