<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>All Staff Members</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

    <div class="container mt-5">

        <h2 class="text-center mb-4">All Staff Members</h2>

        <table class="table table-dark table-bordered text-center">
            <thead>
                <tr>
                    <th>Staff ID</th>
                    <th>Name</th>
                    <th>Password</th>
                </tr>
            </thead>

            <tbody id="staffTable">
                <!-- Data loads here -->
            </tbody>
        </table>
        <button class="btn btn-secondary w-100" onclick="window.history.back()">
            Back
        </button>

    </div>

    <script>
        fetch("get_staff.php")
            .then(res => res.json())
            .then(data => {

                let table = document.getElementById("staffTable");

                data.forEach(staff => {

                    let row = `
            <tr>
                <td>${staff.id}</td>
                <td>${staff.username}</td>
                <td>Hidden</td>
            </tr>   
        `;

                    table.innerHTML += row;
                });

            })
            .catch(err => {
                console.log(err);
                alert("Error loading staff members");
            });
    </script>

</body>

</html>
