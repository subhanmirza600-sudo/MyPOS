<!DOCTYPE html>
<html>
<head>
<title>Display Menu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">
    <div class="card p-4">
        <h2 class="text-center">Menu Items</h2>
        <div id="menu"></div>
        <button class="btn btn-secondary w-100" onclick="window.history.back()">
            Back
        </button>
    </div>
</div>

<script>
let data = [
    { id: 1, name: "Zinger Burger", price: 450 },
    { id: 2, name: "Chicken Biryani", price: 300 },
    { id: 3, name: "Pizza (Large)", price: 1200 },
    { id: 4, name: "French Fries", price: 200 },
    { id: 5, name: "Cold Drink", price: 100 }
];

let output = "";

data.forEach(i => {
    output += `<p>${i.id} - ${i.name} - Rs.${i.price}</p><hr>`;
});

document.getElementById("menu").innerHTML = output;
</script>

</body>
</html>
