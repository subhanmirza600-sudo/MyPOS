<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Delete Menu Item</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

    <div class="container mt-5">
        <div class="card p-4">
            <h2 class="text-center">Delete Menu Item</h2>

            <input type="number" id="deleteId" class="form-control my-3" placeholder="Enter Item ID">

            <button class="btn btn-danger w-100" onclick="deleteItem()">Delete</button>
            <hr>
            <button class="btn btn-secondary w-100" onclick="window.history.back()">
                Back
            </button>
        </div>
    </div>

    <script>
        function deleteItem() {
            let id = document.getElementById("deleteId").value;

            fetch("delete_menu.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id })
            })
                .then(res => res.text())
                .then(data => alert(data));
        }
    </script>

</body>

</html>
