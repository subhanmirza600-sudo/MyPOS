<!DOCTYPE html>
<html>
<head>
<title>Update Menu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">
    <div class="card p-4">
        <h2 class="text-center">Update Menu Item</h2>

        <input type="number" id="id" class="form-control mb-2" placeholder="Item ID">
        <input type="text" id="name" class="form-control mb-2" placeholder="New Name">
        <input type="number" id="price" class="form-control mb-3" placeholder="New Price">

        <button class="btn btn-warning w-100" onclick="updateItem()">Update</button>
                <hr>
        <button class="btn btn-secondary w-100" onclick="window.history.back()">
            Back
        </button>
    </div>
</div>

<script>
function updateItem() {
    fetch("update_menu.php", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            id: id.value,
            name: name.value,
            price: price.value
        })
    })
    .then(res => res.text())
    .then(data => alert(data));
}
</script>

</body>
</html>
