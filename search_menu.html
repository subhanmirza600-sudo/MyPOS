<!DOCTYPE html>
<html>
<head>
<title>Search Menu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">
    <div class="card p-4">
        <h2 class="text-center">Search Menu</h2>

        <input type="text" id="name" class="form-control mb-3" placeholder="Enter Name">

        <button class="btn btn-info w-100" onclick="searchItem()">Search</button>
        <h3 style="text-align: center; margin-top: 20px;">Search Results</h3>
        <div id="result" class="mt-3"></div>
        <button class="btn btn-secondary w-100" onclick="window.history.back()">
            Back
        </button>
    </div>
</div>

<script>

// 🔹 Dummy menu data
let menuData = [
    { id: 1, name: "Zinger Burger", price: 450 },
    { id: 2, name: "Chicken Biryani", price: 300 },
    { id: 3, name: "Pizza", price: 1200 },
    { id: 4, name: "Fries", price: 200 },
    { id: 5, name: "Cold Drink", price: 100 }
];

function searchItem() {

    let name = document.getElementById("name").value.toLowerCase();

    if (name === "") {
        alert("Please enter item name");
        return;
    }

    // 🔹 Filter data
    let results = menuData.filter(item =>
        item.name.toLowerCase().includes(name)
    );

    let output = "";

    if (results.length === 0) {
        output = "<p>No item found</p>";
    } else {
        results.forEach(i => {
            output += `<p>${i.id} - ${i.name} - Rs.${i.price}</p><hr>`;
        });
    }

    document.getElementById("result").innerHTML = output;
}

</script>

</body>
</html>
