<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Date Sales Report</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<div class="card p-4 text-center">

<h2>Sales Report By Date</h2>
<input type="date" id="date" class="form-control mb-3">

<button class="btn btn-info w-100" onclick="getSales()">Get Sales Report</button>

<h3 class="mt-3" id="result"></h3>

        <hr>
        <button class="btn btn-secondary w-100" onclick="window.history.back()">
            Back
        </button>

</div>
</div>

<script>
function getSales() {
    const selectedDate = document.getElementById("date").value;
    fetch(`sales_by_date.php?date=${selectedDate}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
            "Total Sales: Rs " + data.total;
    });
}
</script>

</body>
</html>
