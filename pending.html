<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>All Pending Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

    <div class="container mt-5">

        <h2 class="text-center mb-4">All Pending Orders</h2>

        <table class="table table-dark table-bordered text-center">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Total Amount</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="ordersTable">
                <!-- Data loads here -->
            </tbody>
        </table>
        <button class="btn btn-success w-100" onclick="changeOrderStatus()">
            Change Order Status
        </button>
        <hr>
        <button class="btn btn-secondary w-100" onclick="window.history.back()">
            Back
        </button>

    </div>

    <script>
        fetch("pending.php")
            .then(res => res.json())
            .then(data => {

                let table = document.getElementById("ordersTable");

                data.forEach(order => {

                    let row = `
            <tr>
                <td>${order.order_id}</td>
                <td>${order.customer_name}</td>
                <td>${order.order_date}</td>
                <td>${order.order_time}</td>
                <td>${order.total_amount}</td>
                <td>${order.status}</td>
            </tr>
        `;

                    table.innerHTML += row;
                });

            })
            .catch(err => {
                console.log(err);
                alert("Error loading orders");
            });

    function changeOrderStatus() {

    let orderId = prompt("Enter Order ID to mark as Paid:");

    if (!orderId) {
        alert("Order ID is required");
        return;
    }

    fetch("update_status.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            order_id: orderId,
            status: "Paid"
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "success") {
            alert("Order marked as Paid ✅");
            location.reload();
        } else {
            alert(data.message || "Update failed");
        }

    })
    .catch(err => {
        console.log(err);
        alert("Error updating status");
    });
}
    </script>

</body>

</html>
