<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Staff</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow-lg">

        <h2 class="text-center mb-4">Add Staff</h2>

        <form id="staffForm">

            <input type="text" id="username" class="form-control mb-3" placeholder="Username" required>

            <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

            <button type="submit" class="btn btn-primary w-100">
                Add Staff
            </button>

            <button type="button" class="btn btn-secondary w-100 mt-2" onclick="window.history.back()">
                Back
            </button>

        </form>

    </div>
</div>

<script>
document.getElementById("staffForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    fetch("add_staff.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
        document.getElementById("staffForm").reset();
    })
    .catch(err => {
        console.log(err);
        alert("Server error");
    });
});
</script>

</body>
</html>
