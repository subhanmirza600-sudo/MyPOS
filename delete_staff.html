<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Delete Staff</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<div class="card p-4 text-center">

<h2>Delete Staff</h2>
<input type="text" id="staffId" class="form-control mb-3" placeholder="Enter Staff ID To Delete">

<button class="btn btn-danger w-100" onclick="deleteStaff()">Delete Staff</button>

<h3 class="mt-3" id="result"></h3>

        <hr>
        <button class="btn btn-secondary w-100" onclick="window.history.back()">
            Back
        </button>

</div>
</div>

<script>
function deleteStaff() {
    const staffId = document.getElementById("staffId").value;
    fetch("delete_staff.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ id: staffId })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.message;
    });
}
</script>

</body>
</html>
